<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 2px 0; font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, sans-serif; }

.wrapper {
  border: 1px solid #d8cecb;
  border-radius: 0.82rem;
  background: #fff;
  box-shadow: 0 1px 2px rgba(42, 23, 19, 0.08);
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
}
.wrapper:focus-within {
  border-color: #bf9a93;
  box-shadow: 0 0 0 2px rgba(134, 26, 17, 0.14);
}

/* ---- Thumbnails ---- */
.thumbs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 12px 2px;
}
.thumbs:empty { display: none; padding: 0; }

.thumb {
  position: relative;
  width: 56px; height: 56px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #ded5d3;
  flex-shrink: 0;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb .rm {
  position: absolute; top: 2px; right: 2px;
  width: 16px; height: 16px;
  background: rgba(0,0,0,0.55); color: #fff;
  border: none; border-radius: 50%;
  font-size: 10px; line-height: 16px; text-align: center;
  cursor: pointer; opacity: 0; transition: opacity 0.15s;
}
.thumb:hover .rm { opacity: 1; }

/* ---- Input row ---- */
.row {
  display: flex;
  align-items: flex-end;
  padding: 7px 7px 7px 11px;
  gap: 2px;
}

.ibtn {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  border-radius: 8px; cursor: pointer;
  color: #998886; transition: color 0.15s, background 0.15s;
}
.ibtn:hover { background: #f6f1f0; color: #6b3028; }
.ibtn svg { width: 18px; height: 18px; }

.txt {
  flex: 1;
  border: none; outline: none; resize: none;
  font-size: 14px; line-height: 1.5;
  max-height: 120px; min-height: 21px;
  overflow-y: auto;
  padding: 5px 4px;
  font-family: inherit;
  background: transparent;
  color: #5e4f4d;
}
.txt::placeholder { color: #b8acab; }

.send {
  flex-shrink: 0;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid #762018;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(180deg, #9d2419 0%, #861a11 100%);
  color: #fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 4px rgba(90, 23, 17, 0.22);
  transition: background 0.15s, box-shadow 0.15s, transform 0.05s;
}
.send:hover {
  background: linear-gradient(180deg, #892015 0%, #6e150e 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 3px 6px rgba(75, 18, 13, 0.24);
}
.send:active { transform: translateY(1px); }
.send svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<div class="wrapper" id="W">
  <div class="thumbs" id="T"></div>
  <div class="row">
    <button class="ibtn" id="aBtn" title="上传图片 / Upload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <input type="file" id="fI" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
    <textarea class="txt" id="txt" rows="1"
      placeholder="输入你的问题，例如：我对子网划分感到困惑"></textarea>
    <button class="send" id="sBtn" title="发送 (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
<script>
(function(){
  var T = document.getElementById('T');
  var txt = document.getElementById('txt');
  var aBtn = document.getElementById('aBtn');
  var fI = document.getElementById('fI');
  var sBtn = document.getElementById('sBtn');
  var W = document.getElementById('W');
  var imgs = [], _id = 0;

  function post(type, d) {
    window.parent.postMessage(Object.assign({isStreamlitMessage:true, type:type}, d||{}), "*");
  }
  function ht() { post("streamlit:setFrameHeight", {height: document.body.scrollHeight + 2}); }

  /* ---- Add / remove image ---- */
  function addImg(dataUrl) {
    var id = ++_id;
    var b64 = dataUrl.split(',')[1];
    var mime = dataUrl.split(';')[0].split(':')[1];
    imgs.push({b:b64, m:mime, id:id});
    var d = document.createElement('div');
    d.className = 'thumb'; d.dataset.id = id;
    d.innerHTML = '<img src="'+dataUrl+'"/><button class="rm">&times;</button>';
    d.querySelector('.rm').onclick = function(e){
      e.stopPropagation();
      imgs = imgs.filter(function(x){return x.id!==id;});
      d.remove(); ht();
    };
    T.appendChild(d); ht();
  }

  function readFiles(files) {
    for (var i = 0; i < files.length; i++) {
      (function(f){
        if (f.type.indexOf('image/') !== 0) return;
        var r = new FileReader();
        r.onload = function(e){ addImg(e.target.result); };
        r.readAsDataURL(f);
      })(files[i]);
    }
  }

  /* ---- Submit ---- */
  function submit() {
    var t = txt.value.trim();
    if (!t && imgs.length === 0) return;
    post("streamlit:setComponentValue", {value: JSON.stringify({
      text: t,
      images: imgs.map(function(x){return {base64:x.b, mime:x.m};})
    })});
    txt.value = ''; txt.style.height = 'auto';
    imgs = []; T.innerHTML = ''; ht();
  }

  /* ---- Auto-resize textarea ---- */
  txt.addEventListener('input', function(){
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    ht();
  });

  /* ---- Keyboard ---- */
  txt.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); submit(); }
  });

  sBtn.addEventListener('click', submit);
  aBtn.addEventListener('click', function(){ fI.click(); });
  fI.addEventListener('change', function(){ readFiles(this.files); this.value = ''; });

  /* ---- Paste (anywhere in component) ---- */
  document.addEventListener('paste', function(e){
    var items = (e.clipboardData||{}).items;
    if (!items) return;
    var found = false;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image/') === 0) {
        found = true;
        var f = items[i].getAsFile();
        var r = new FileReader();
        r.onload = function(ev){ addImg(ev.target.result); };
        r.readAsDataURL(f);
      }
    }
    if (found) e.preventDefault();
  });

  /* ---- Theme ---- */
  window.addEventListener("message", function(e){
    if (!e.data || e.data.type !== "streamlit:render") return;
    ht();
    /* Apply Streamlit theme if available */
    try {
      var t = e.data.theme || (e.data.args && e.data.args.theme);
      if (t) {
        W.style.background = t.backgroundColor || '';
        W.style.borderColor = '#d8cecb';
        txt.style.color = '#5e4f4d';
      }
    } catch(_){}
  });

  /* ---- Ready ---- */
  post("streamlit:componentReady", {apiVersion: 1}); ht();
  setTimeout(function(){ post("streamlit:componentReady", {apiVersion: 1}); ht(); }, 100);
  setTimeout(function(){ post("streamlit:componentReady", {apiVersion: 1}); ht(); }, 500);

  /* Auto-focus textarea on load */
  setTimeout(function(){ txt.focus(); }, 200);
})();
</script>
</body>
</html>
